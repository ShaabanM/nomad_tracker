<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nomad Tracker">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <meta name="description" content="Track your visa days across multiple countries. Never overstay anywhere.">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>Nomad Tracker</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div id="app">
    <!-- Dashboard Tab -->
    <div id="tab-dashboard" class="tab-content"></div>

    <!-- Timeline Tab -->
    <div id="tab-timeline" class="tab-content" hidden></div>

    <!-- Settings Tab -->
    <div id="tab-settings" class="tab-content" hidden></div>

    <!-- Tab Bar -->
    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="dashboard">
        <span class="tab-icon">📊</span>
        <span>Dashboard</span>
      </button>
      <button class="tab-btn" data-tab="timeline">
        <span class="tab-icon">📅</span>
        <span>Timeline</span>
      </button>
      <button class="tab-btn" data-tab="settings">
        <span class="tab-icon">⚙️</span>
        <span>Settings</span>
      </button>
    </nav>
  </div>

  <!-- Modal overlay (used for detail view and forms) -->
  <div id="modal" class="modal-overlay">
    <div class="modal-sheet"></div>
  </div>

  <!-- Onboarding overlay -->
  <div id="onboarding" class="onboarding-overlay hidden"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
