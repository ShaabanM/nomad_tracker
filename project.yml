name: NomadTracker
options:
  bundleIdPrefix: com.shaaban
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  NomadTracker:
    type: application
    platform: iOS
    sources: [NomadTracker]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shaaban.nomadtracker
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: NomadTracker/Info.plist
    postCompileScripts: []
